# À insérer dans le vhost ilvcredit.triangleoffensif.fr (server 443),
# fichier réel : /home/ubuntu/challengeBut/nginx/conf/ilvcredit.conf
# (nginx dockerisé → recharger via : docker exec challengebut-nginx-1 nginx -s reload)

    # API ILV Cuisine (Flask/gunicorn :3024)
    location /cuisine/api/ {
        proxy_pass http://172.17.0.1:3024/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
        auth_basic "Acces restreint - ILV Cuisine";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd-vector;
    }

    # Interface ILV Cuisine — protégée par Basic Auth
    location /cuisine/ {
        proxy_pass http://172.17.0.1:3024/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        auth_basic "Acces restreint - ILV Cuisine";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd-vector;
    }
